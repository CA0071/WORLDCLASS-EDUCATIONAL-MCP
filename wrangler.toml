name = "worldclass-educational-mcp"
main = "src/index.ts"
compatibility_date = "2026-06-21"

[build]
command = "npm run build"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "ce13dba7ee6644d287a60868468a5be7"

[[kv_namespaces]]
binding = "AUDIT_KV"
id = "a0d1825827f24397b7fe93cd6bb672f1"

[[d1_databases]]
binding = "APP_DB"
database_name = "schoolme101-mcp"
database_id = "9110399d-27ae-492f-a60c-a51677ccc646"

[[r2_buckets]]
binding = "ASSET_BUCKET"
bucket_name = "schoolme101-mcp-assets"

[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "120"

