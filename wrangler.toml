name = "school101-mcp"
main = "src/index.ts"
type = "javascript"
compatibility_date = "2024-08-01"

# API version
version = "1.0.0"

# Build configuration
[build]
command = "npm run build"
cwd = "./"
main = "dist/index.js"

# Development environment
[env.development]
name = "school101-mcp-dev"
route = "https://dev-api.school101.localhost/*"
zone_id = "YOUR_ZONE_ID_DEV"
vars = { ENVIRONMENT = "development", LOG_LEVEL = "debug" }

# Production environment
[env.production]
name = "school101-mcp-prod"
route = "https://api.school101.ai/*"
zone_id = "YOUR_ZONE_ID_PROD"
vars = { ENVIRONMENT = "production", LOG_LEVEL = "info" }

# KV Namespaces for caching and state
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_CACHE_KV_ID"
preview_id = "YOUR_CACHE_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "YOUR_AUTH_TOKENS_KV_ID"
preview_id = "YOUR_AUTH_TOKENS_KV_PREVIEW_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "YOUR_RATE_LIMIT_KV_ID"
preview_id = "YOUR_RATE_LIMIT_KV_PREVIEW_ID"

# D1 Database bindings (Cloudflare's SQLite-compatible database)
[[d1_databases]]
binding = "DB"
database_name = "school101-prod"
database_id = "YOUR_DATABASE_ID"
preview_database_id = "YOUR_PREVIEW_DATABASE_ID"

# R2 bucket for file storage
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "school101-data"
preview_bucket_name = "school101-data-preview"

# Durable Objects for persistent state (optional, for future use)
[[durable_objects.bindings]]
name = "STUDENT_PROGRESS_CACHE"
class_name = "StudentProgressCache"

# Analytics Engine
analytics_engine_binding = "ANALYTICS"

# Triggers and scheduled events
[triggers]
crons = ["0 2 * * *"]  # Daily maintenance at 2 AM UTC

# Environment variables (secrets)
# Set these via `wrangler secret put`
# - CANVAS_API_TOKEN
# - CANVAS_INSTANCE_URL
# - DATABASE_URL
# - REDIS_URL
# - MICROSOFT_LEARN_API_KEY
# - SEMANTIC_SCHOLAR_API_KEY
# - WOLFRAM_API_KEY

# Tail consumers (for log aggregation)
[[tail_consumers]]
service = "school101-analytics"
environment = "production"

# Analytics tracking
[analytics]
enabled = true

# CORS configuration
[env.production.cors]
allowed_origins = ["https://school101.ai", "https://app.school101.ai", "https://*.school101.ai"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["Content-Type", "Authorization", "X-API-Key"]
max_age = 3600
allow_credentials = true

[env.development.cors]
allowed_origins = ["http://localhost:3000", "http://localhost:3001"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["*"]
max_age = 3600
allow_credentials = true

# Limits and rate limiting
limits = { cpu_ms = 50000 }

# Compatibility flags for newer JavaScript features
compatibility_flags = ["nodejs_compat", "streams_enable_constructors"]
